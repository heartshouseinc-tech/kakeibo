<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1565C0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="日報">
<link rel="manifest" href="manifest.json">
<title>建設日報 PWA</title>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, setDoc, getDoc, deleteDoc, collection, onSnapshot, serverTimestamp, getDocs, writeBatch }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCVk2miG5TK1ffTofXLh0hHgeSbOvmIgZ8",
    authDomain: "kensetsu-nippo-842a2.firebaseapp.com",
    projectId: "kensetsu-nippo-842a2",
    storageBucket: "kensetsu-nippo-842a2.firebasestorage.app",
    messagingSenderId: "702880974315",
    appId: "1:702880974315:web:985321dc9180046629c5ae"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.__firebase = { auth, db, serverTimestamp,
    signInWithEmailAndPassword, signOut, onAuthStateChanged,
    doc, setDoc, getDoc, deleteDoc, collection, onSnapshot, getDocs, writeBatch };
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bd:#0D47A1;--bm:#1565C0;--bmi:#1976D2;--bl:#42A5F5;
  --bp:#BBDEFB;--bg:#E3F2FD;--g:#2E7D32;--gl:#4CAF50;
  --r:#C62828;--rl:#EF5350;--o:#F57F17;
  --g1:#F5F5F5;--g2:#EEEEEE;--g3:#E0E0E0;--g4:#BDBDBD;--g6:#757575;--g8:#424242;
  --w:#FFFFFF;--cw:70px;--nw:128px;--rh:46px;--chh:42px;
  --font:'Hiragino Sans','Meiryo',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--font);}
.screen{display:none;width:100%;height:100%;}
.screen.active{display:flex;flex-direction:column;}

/* LOGIN */
#loginScreen{background:linear-gradient(135deg,#0D47A1,#1565C0,#1976D2);align-items:center;justify-content:center;}
.lcard{background:var(--w);border-radius:16px;padding:32px 28px;width:min(400px,92vw);box-shadow:0 8px 40px rgba(0,0,0,.3);}
.llogo{text-align:center;margin-bottom:20px;}
.llogo .ico{font-size:44px;}
.llogo h1{color:var(--bd);font-size:20px;font-weight:700;margin-top:6px;}
.llogo p{color:var(--g6);font-size:12px;margin-top:3px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:12px;color:var(--g8);font-weight:600;margin-bottom:5px;}
.fg input{width:100%;padding:11px 13px;border:2px solid var(--g3);border-radius:8px;font-size:16px;outline:none;transition:border-color .2s;}
.fg input:focus{border-color:var(--bmi);}
.btn-login{width:100%;padding:13px;background:var(--bm);color:var(--w);border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;margin-top:6px;}
.btn-login:hover{background:var(--bd);}
.lerr{color:var(--r);font-size:12px;text-align:center;margin-top:8px;min-height:16px;}

/* HEADER */
.app-header{background:var(--bm);color:var(--w);padding:0 10px;height:50px;min-height:50px;
  display:flex;align-items:center;justify-content:space-between;gap:6px;z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,.3);flex-shrink:0;}
.htitle{font-size:14px;font-weight:700;}
.month-nav{display:flex;align-items:center;gap:5px;}
.mlabel{font-size:15px;font-weight:700;white-space:nowrap;}
.hright{display:flex;align-items:center;gap:5px;}

/* TOOLBAR */
.sub-tb{background:var(--w);border-bottom:2px solid var(--bp);padding:6px 10px;
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex-shrink:0;z-index:99;}
.today-info{color:var(--r);font-weight:700;font-size:13px;white-space:nowrap;}
.edit-badge{background:var(--r);color:var(--w);font-size:10px;font-weight:700;
  padding:3px 7px;border-radius:4px;white-space:nowrap;}
.tb-sp{flex:1;}
.sbox{display:flex;align-items:center;gap:3px;background:var(--g1);
  border:1px solid var(--g3);border-radius:6px;padding:4px 8px;}
.sbox input{border:none;background:transparent;outline:none;font-size:12px;width:90px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 12px;border-radius:6px;
  font-size:12px;font-weight:600;border:none;cursor:pointer;white-space:nowrap;transition:all .15s;}
.btn:active{transform:scale(.96);}
.btn-today{background:var(--bmi);color:var(--w);}
.btn-save{background:var(--g);color:var(--w);font-size:13px;padding:8px 16px;}
.btn-print{background:var(--w);color:var(--g8);border:2px solid var(--g3);}
.btn-csv{background:var(--o);color:var(--w);}
.btn-prev,.btn-next{background:var(--bp);color:var(--bd);padding:7px 10px;}
.btn-icon{padding:7px 9px;background:rgba(255,255,255,.2);color:var(--w);border:none;border-radius:6px;font-size:15px;cursor:pointer;}
.btn-logout{background:rgba(255,255,255,.15);color:var(--w);padding:5px 9px;font-size:11px;border-radius:5px;border:none;cursor:pointer;}
.btn-logout:hover{background:rgba(255,255,255,.3);}
.btn-admin{background:rgba(255,255,255,.2);color:var(--w);padding:6px 9px;font-size:12px;border-radius:6px;border:none;cursor:pointer;}

/* TABLE */
.sheet-wrapper{flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column;}
.sheet-scroll{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;}
.report-table{border-collapse:collapse;table-layout:fixed;font-size:12px;}
.report-table th,.report-table td{border:1px solid var(--g3);text-align:center;padding:0;vertical-align:middle;white-space:nowrap;}
.th-corner{position:sticky;left:0;top:0;z-index:50;background:var(--bm);color:var(--w);
  width:var(--nw);min-width:var(--nw);max-width:var(--nw);height:var(--chh);font-size:11px;font-weight:700;border:1px solid var(--bd);}
.th-date{position:sticky;top:0;z-index:40;background:var(--bg);color:var(--bd);
  width:var(--cw);min-width:var(--cw);max-width:var(--cw);height:var(--chh);font-size:12px;font-weight:600;border:1px solid var(--bp);}
.th-date.today-col{background:var(--bm);color:var(--w);font-weight:700;font-size:14px;border:2px solid var(--bd);}
.th-date.sun{color:var(--rl);background:#FFF3F3;}
.th-date.sat{color:var(--bmi);background:#F3F6FF;}
.th-date.today-col.sun,.th-date.today-col.sat{background:var(--bm);color:var(--w);}
.td-name{position:sticky;left:0;z-index:30;background:var(--w);color:var(--g8);
  width:var(--nw);min-width:var(--nw);max-width:var(--nw);height:var(--rh);
  font-size:12px;font-weight:600;border-right:2px solid var(--bp);padding:0 6px;text-align:left;}
.td-name .rn{color:var(--g4);font-size:10px;margin-right:4px;}
tr:nth-child(even) .td-name{background:var(--bg);}
.td-cell{width:var(--cw);min-width:var(--cw);max-width:var(--cw);height:var(--rh);padding:2px 3px;transition:background .1s;}
tr:nth-child(even) .td-cell{background:var(--bg);}
tr:nth-child(odd) .td-cell{background:var(--w);}
.td-cell.today-col{background:#FFFDE7!important;border-left:1px solid #FDD835;border-right:1px solid #FDD835;}
.td-cell.editable:hover{background:#E8F4FF!important;cursor:pointer;}
.td-cell.locked{cursor:default;}
.cc{width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:1px;}
.cw{font-size:10px;font-weight:600;color:var(--bd);line-height:1.2;max-width:62px;overflow:hidden;text-overflow:ellipsis;}
.ch{font-size:9px;color:var(--g6);}
.cd{color:var(--g4);font-size:13px;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center;padding:14px;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--w);border-radius:16px;width:min(480px,100%);max-height:92vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.3);animation:mIn .2s ease;}
@keyframes mIn{from{transform:scale(.92) translateY(20px);opacity:0;}to{transform:none;opacity:1;}}
.mhead{background:var(--bm);color:var(--w);padding:14px 18px;border-radius:16px 16px 0 0;display:flex;align-items:center;justify-content:space-between;}
.mhead h2{font-size:15px;font-weight:700;}
.mclose{background:none;border:none;color:var(--w);font-size:20px;cursor:pointer;}
.mbody{padding:18px;}
.minfo{background:var(--bg);border-radius:8px;padding:9px 12px;margin-bottom:14px;}
.minfo p{font-size:12px;color:var(--bd);font-weight:600;}
.fgrp{margin-bottom:14px;}
.fgrp label{display:block;font-size:12px;font-weight:700;color:var(--g8);margin-bottom:5px;}
.fgrp select,.fgrp input[type=text],.fgrp input[type=number],.fgrp input[type=email],.fgrp input[type=password],.fgrp textarea{
  width:100%;padding:11px 12px;border:2px solid var(--g3);border-radius:8px;font-size:15px;outline:none;transition:border-color .2s;font-family:var(--font);}
.fgrp select:focus,.fgrp input:focus,.fgrp textarea:focus{border-color:var(--bmi);}
.fgrp textarea{min-height:70px;resize:vertical;}
.wq{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
.wqb{padding:6px 10px;background:var(--bg);border:2px solid var(--bp);border-radius:6px;font-size:11px;font-weight:600;color:var(--bd);cursor:pointer;transition:all .15s;}
.wqb:hover,.wqb.sel{background:var(--bm);color:var(--w);border-color:var(--bd);}
.hrow{display:flex;gap:7px;align-items:center;}
.hrow input{flex:1;}
.hunit{font-size:13px;font-weight:600;color:var(--g6);}
.hbtns{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap;}
.hbtn{padding:9px 12px;background:var(--bg);border:2px solid var(--bp);border-radius:6px;font-size:12px;font-weight:700;color:var(--bd);cursor:pointer;}
.hbtn:hover{background:var(--bp);}
.mfoot{display:flex;gap:8px;padding:0 18px 18px;}
.btn-msave{flex:1;padding:13px;background:var(--g);color:var(--w);border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;}
.btn-mclear{padding:13px 14px;background:var(--w);color:var(--r);border:2px solid var(--r);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
.btn-mcancel{padding:13px 14px;background:var(--g2);color:var(--g8);border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}

/* ADMIN */
.asec{margin-bottom:18px;}
.asec h3{font-size:13px;font-weight:700;color:var(--bd);margin-bottom:9px;padding-bottom:5px;border-bottom:2px solid var(--bp);}
.uitem{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--g1);border-radius:8px;margin-bottom:5px;}
.uitem .un{font-weight:600;font-size:13px;}
.uitem .ue{font-size:11px;color:var(--g6);}
.badge-admin{background:var(--bm);color:var(--w);font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700;}
.btn-del{background:var(--r);color:var(--w);border:none;border-radius:5px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;}
.btn-hide{background:var(--o);color:var(--w);border:none;border-radius:5px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;}
.btn-show{background:var(--g);color:var(--w);border:none;border-radius:5px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;}
.badge-hidden{background:var(--g4);color:var(--w);font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700;}
.uitem.is-hidden{opacity:.55;background:#f5f5f5;}
.admin-tabs{display:flex;gap:0;margin-bottom:12px;border-radius:8px;overflow:hidden;border:2px solid var(--bp);}
.admin-tab{flex:1;padding:8px;border:none;background:var(--w);color:var(--g6);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;}
.admin-tab.active{background:var(--bm);color:var(--w);}
.uitem-btns{display:flex;gap:5px;flex-shrink:0;}

/* TOAST */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--g8);color:var(--w);padding:11px 22px;border-radius:8px;font-size:13px;font-weight:600;
  opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--g);}
.toast.error{background:var(--r);}

/* OFFLINE */
.off-banner{display:none;background:var(--o);color:var(--w);text-align:center;font-size:12px;font-weight:600;padding:5px;flex-shrink:0;}
.off-banner.show{display:block;}

/* LOADING */
.loading-ov{display:none;position:fixed;inset:0;background:rgba(255,255,255,.8);z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:10px;}
.loading-ov.show{display:flex;}
.spinner{width:38px;height:38px;border:4px solid var(--bp);border-top-color:var(--bm);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* SYNC DOT */
.sdot{width:8px;height:8px;border-radius:50%;background:#4CAF50;display:inline-block;margin-left:3px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* SCROLLBAR */
.sheet-scroll::-webkit-scrollbar{width:7px;height:7px;}
.sheet-scroll::-webkit-scrollbar-track{background:var(--g2);}
.sheet-scroll::-webkit-scrollbar-thumb{background:var(--bl);border-radius:4px;}

@media(max-width:480px){
  :root{--cw:56px;--nw:108px;--rh:42px;}
  .btn{padding:6px 9px;font-size:11px;}
  .btn-save{font-size:12px;padding:7px 11px;}
  .sbox{display:none;}
}
@media print{
  .app-header,.sub-tb,.modal-overlay,.toast,.off-banner{display:none!important;}
  body,html{overflow:visible!important;height:auto!important;}
  .sheet-wrapper,.sheet-scroll{overflow:visible!important;}
  .report-table{font-size:9px;}
  .td-name{width:80px!important;min-width:80px!important;}
  .td-cell,.th-date{width:44px!important;min-width:44px!important;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="lcard">
    <div class="llogo">
      <div class="ico">🏗️</div>
      <h1>建設業 日報システム</h1>
      <p>Construction Daily Report</p>
    </div>
    <div class="fg"><label>メールアドレス</label>
      <input type="email" id="loginEmail" placeholder="example@company.com" autocomplete="email">
    </div>
    <div class="fg"><label>パスワード</label>
      <input type="password" id="loginPassword" placeholder="パスワード" autocomplete="current-password">
    </div>
    <button class="btn-login" onclick="doLogin()">🔑 ログイン</button>
    <div class="lerr" id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="appScreen" class="screen">
  <div class="off-banner" id="offBanner">📵 オフラインモード — 再接続時に自動同期</div>

  <!-- Header -->
  <div class="app-header">
    <div style="display:flex;align-items:center;gap:7px;">
      <span style="font-size:20px;">🏗️</span>
      <div>
        <div class="htitle">日報入力</div>
      </div>
    </div>
    <div class="month-nav">
      <button class="btn btn-prev" onclick="changeMonth(-1)">◀</button>
      <span class="mlabel" id="monthLabel">2024年5月</span>
      <button class="btn btn-next" onclick="changeMonth(1)">▶</button>
    </div>
    <div class="hright">
      <span class="sdot" id="syncDot"></span>
      <button class="btn-admin" id="adminBtn" onclick="openAdminModal()" style="display:none">⚙️ 管理</button>
      <button class="btn-logout" onclick="doLogout()">ログアウト</button>
    </div>
  </div>

  <!-- Sub Toolbar -->
  <div class="sub-tb">
    <span class="today-info" id="todayInfo">本日：5月24日（金）</span>
    <button class="btn btn-today" onclick="scrollToToday()">📅 今日へ</button>
    <span class="edit-badge">当日のみ編集可</span>
    <div class="tb-sp"></div>
    <div class="sbox"><span>🔍</span><input type="text" id="searchInput" placeholder="氏名検索..." oninput="filterRows()"></div>
    <button class="btn btn-csv" onclick="exportCSV()">📊 CSV</button>
    <button class="btn btn-print" onclick="window.print()">🖨️</button>
    <button class="btn btn-save" onclick="saveAllPending()">💾 保存</button>
  </div>

  <!-- Sheet -->
  <div class="sheet-wrapper">
    <div class="sheet-scroll" id="sheetScroll">
      <table class="report-table" id="reportTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div class="mhead">
      <h2>📝 日報入力</h2>
      <button class="mclose" onclick="closeEditModal()">✕</button>
    </div>
    <div class="mbody">
      <div class="minfo"><p id="modalInfo">田中 太郎 / 5月24日</p></div>
      <div class="fgrp">
        <label>🔨 作業内容</label>
        <div class="wq" id="wqBtns"></div>
        <input type="text" id="workInput" placeholder="作業内容を入力またはボタンで選択" style="margin-top:7px;">
      </div>
      <div class="fgrp">
        <label>⏱ 作業時間</label>
        <div class="hrow">
          <input type="number" id="hoursInput" min="0" max="24" step="0.5" placeholder="0">
          <span class="hunit">時間</span>
        </div>
        <div class="hbtns">
          <button class="hbtn" onclick="setH(4)">4h</button>
          <button class="hbtn" onclick="setH(5)">5h</button>
          <button class="hbtn" onclick="setH(6)">6h</button>
          <button class="hbtn" onclick="setH(7)">7h</button>
          <button class="hbtn" onclick="setH(8)">8h</button>
          <button class="hbtn" onclick="setH(9)">9h</button>
          <button class="hbtn" onclick="setH(10)">10h</button>
        </div>
      </div>
      <div class="fgrp">
        <label>📝 備考</label>
        <textarea id="memoInput" placeholder="備考・特記事項など"></textarea>
      </div>
    </div>
    <div class="mfoot">
      <button class="btn-mclear" onclick="clearCell()">🗑️ クリア</button>
      <button class="btn-mcancel" onclick="closeEditModal()">キャンセル</button>
      <button class="btn-msave" onclick="saveCell()">💾 保存</button>
    </div>
  </div>
</div>

<!-- ADMIN MODAL -->
<div class="modal-overlay" id="adminModal">
  <div class="modal-box">
    <div class="mhead">
      <h2>⚙️ 管理者設定</h2>
      <button class="mclose" onclick="closeAdminModal()">✕</button>
    </div>
    <div class="mbody">
      <!-- タブ切替 -->
      <div class="admin-tabs">
        <button class="admin-tab active" id="atab-active" onclick="switchAdminTab('active')">📋 表示中</button>
        <button class="admin-tab" id="atab-hidden" onclick="switchAdminTab('hidden')">🚫 非表示</button>
        <button class="admin-tab" id="atab-add" onclick="switchAdminTab('add')">➕ 追加</button>
      </div>

      <!-- 表示中ユーザー -->
      <div id="apanel-active">
        <div class="asec">
          <h3>👥 表示中の従業員</h3>
          <p style="font-size:11px;color:var(--g6);margin-bottom:8px;">「非表示」にするとアプリから見えなくなります。ログインは維持されます。</p>
          <div id="userListActive"></div>
        </div>
      </div>

      <!-- 非表示ユーザー -->
      <div id="apanel-hidden" style="display:none;">
        <div class="asec">
          <h3>🚫 非表示の従業員</h3>
          <p style="font-size:11px;color:var(--g6);margin-bottom:8px;">「表示に戻す」で日報に再表示されます。</p>
          <div id="userListHidden"></div>
        </div>
      </div>

      <!-- 追加フォーム -->
      <div id="apanel-add" style="display:none;">
        <div class="asec">
          <h3>新規従業員追加</h3>
          <div class="fgrp"><label>氏名</label><input type="text" id="nuName" placeholder="田中 太郎"></div>
          <div class="fgrp"><label>メールアドレス</label><input type="email" id="nuEmail" placeholder="tanaka@example.com"></div>
          <div class="fgrp"><label>パスワード（初期）</label><input type="password" id="nuPass" placeholder="6文字以上"></div>
          <div class="fgrp"><label><input type="checkbox" id="nuAdmin"> 管理者権限を付与</label></div>
          <button class="btn-msave" style="width:100%;padding:11px;" onclick="addUser()">登録</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Loading -->
<div class="loading-ov" id="loadingOv">
  <div class="spinner"></div>
  <span style="color:var(--bd);font-weight:700;">読み込み中...</span>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
const S = {
  user: null, userDoc: null, isAdmin: false,
  vy: new Date().getFullYear(), vm: new Date().getMonth()+1,
  ty: new Date().getFullYear(), tm: new Date().getMonth()+1, td: new Date().getDate(),
  emps: [], data: {}, pending: {}, unsubs: [], editing: null
};
const WORKS = ['土台','棟上げ','木下地','断熱材','ボード貼り','階段','巾木','化粧仕事'];
const DOW = ['日','月','火','水','木','金','土'];

// ===== FIREBASE =====
function fb(){ return window.__firebase; }
function mkKey(){ return `${S.vy}-${String(S.vm).padStart(2,'0')}`; }

// ===== AUTH =====
async function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPassword').value;
  const err   = document.getElementById('loginError');
  err.textContent = '';
  if(!email||!pass){err.textContent='メールとパスワードを入力してください';return;}
  showLoad(true);
  try{
    await fb().signInWithEmailAndPassword(fb().auth, email, pass);
  }catch(e){
    err.textContent = authErr(e.code);
    showLoad(false);
  }
}

async function doLogout(){
  if(!confirm('ログアウトしますか？'))return;
  cleanup();
  await fb().signOut(fb().auth);
}

function authErr(c){
  const m={'auth/user-not-found':'ユーザーが見つかりません','auth/wrong-password':'パスワードが間違っています',
    'auth/invalid-email':'メールアドレスが無効です','auth/too-many-requests':'しばらく待ってから再試行してください',
    'auth/invalid-credential':'メールまたはパスワードが間違っています'};
  return m[c]||c;
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('loginPassword').addEventListener('keydown',e=>{ if(e.key==='Enter')doLogin(); });
  document.getElementById('loginEmail').addEventListener('keydown',e=>{ if(e.key==='Enter')document.getElementById('loginPassword').focus(); });
  window.addEventListener('online',()=>{ document.getElementById('offBanner').classList.remove('show'); showToast('オンラインに復帰しました','success'); resubAll(); });
  window.addEventListener('offline',()=>{ document.getElementById('offBanner').classList.add('show'); });
  if(!navigator.onLine) document.getElementById('offBanner').classList.add('show');
  if('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js').catch(()=>{});

  fb().onAuthStateChanged(fb().auth, async user=>{
    showLoad(false);
    if(user){
      S.user = user;
      await loadMyDoc();
      showScr('appScreen');
      await initApp();
    } else {
      S.user=null; S.isAdmin=false;
      cleanup();
      showScr('loginScreen');
    }
  });
});

async function loadMyDoc(){
  try{
    const {db,doc,getDoc,setDoc,serverTimestamp} = fb();
    const snap = await getDoc(doc(db,'users',S.user.uid));
    if(snap.exists()){
      S.userDoc = snap.data();
      S.isAdmin = !!snap.data().isAdmin;
    } else {
      const d = {uid:S.user.uid,email:S.user.email,
        name:S.user.displayName||S.user.email.split('@')[0],
        isAdmin:false,createdAt:serverTimestamp()};
      await setDoc(doc(db,'users',S.user.uid),d);
      S.userDoc=d; S.isAdmin=false;
    }
  }catch(e){ console.error(e); }
}

async function initApp(){
  updInfo();
  // 管理者ボタン：ログインユーザーのisAdminで判定
  document.getElementById('adminBtn').style.display = S.isAdmin ? '' : 'none';
  await loadEmps();
  buildTable();
  subReports();
  setTimeout(scrollToToday, 600);
}

function updInfo(){
  const d = new Date(S.ty,S.tm-1,S.td);
  document.getElementById('todayInfo').textContent = `本日：${S.tm}月${S.td}日（${DOW[d.getDay()]}）`;
  document.getElementById('monthLabel').textContent = `${S.vy}年${S.vm}月`;
}

// ===== LOAD EMPLOYEES =====
async function loadEmps(){
  try{
    const {db,collection,getDocs} = fb();
    const snap = await getDocs(collection(db,'users'));
    S.allUsersForAdmin = []; // 管理パネル用（非表示含む全員）
    S.emps = [];
    snap.forEach(d=>{
      const u = {uid:d.id,...d.data()};
      S.allUsersForAdmin.push(u);
      if(!u.hidden) S.emps.push(u); // 非表示は日報テーブルから除外
    });
    S.emps.sort((a,b)=>{
      if(a.isAdmin&&!b.isAdmin)return -1;
      if(!a.isAdmin&&b.isAdmin)return 1;
      return (a.name||'').localeCompare(b.name||'');
    });
    if(S.emps.length>10) S.emps=S.emps.slice(0,10);
  }catch(e){
    console.error(e);
    S.emps=[{uid:S.user.uid,name:S.userDoc?.name||S.user.email,email:S.user.email,isAdmin:S.isAdmin}];
  }
}

// ===== BUILD TABLE =====
function daysIn(y,m){ return new Date(y,m,0).getDate(); }

function buildTable(){
  const y=S.vy, m=S.vm, days=daysIn(y,m);
  const thead=document.getElementById('tableHead');
  const tbody=document.getElementById('tableBody');
  thead.innerHTML=''; tbody.innerHTML='';
  document.getElementById('monthLabel').textContent=`${y}年${m}月`;

  // Header row
  const hr=document.createElement('tr');
  const corner=document.createElement('th');
  corner.className='th-corner';
  corner.innerHTML=`<div style="font-size:10px;">氏名一覧<br><span style="opacity:.7;font-size:9px;">(最大10名)</span></div>`;
  hr.appendChild(corner);
  for(let d=1;d<=days;d++){
    const th=document.createElement('th');
    const dt=new Date(y,m-1,d), dow=dt.getDay();
    const isToday=(y===S.ty&&m===S.tm&&d===S.td);
    let cls='th-date';
    if(isToday)cls+=' today-col';
    else if(dow===0)cls+=' sun';
    else if(dow===6)cls+=' sat';
    th.className=cls; th.id=`th-${d}`;
    th.innerHTML=`<div>${d}</div><div style="font-size:8px;opacity:.75;">${DOW[dow]}</div>`;
    hr.appendChild(th);
  }
  thead.appendChild(hr);

  // Data rows
  S.emps.forEach((emp,i)=>{
    const tr=document.createElement('tr');
    tr.id=`row-${emp.uid}`; tr.dataset.uid=emp.uid; tr.dataset.name=emp.name||'';
    const ntd=document.createElement('td');
    ntd.className='td-name';
    ntd.innerHTML=`<span class="rn">${i+1}</span>${emp.name||emp.email}${emp.isAdmin?` <span class="badge-admin">管</span>`:''}`;
    tr.appendChild(ntd);
    for(let d=1;d<=days;d++){
      const td=document.createElement('td');
      const isToday=(y===S.ty&&m===S.tm&&d===S.td);
      const canEdit=isToday&&(emp.uid===S.user.uid||S.isAdmin);
      td.className='td-cell'+(isToday?' today-col':'')+(canEdit?' editable':' locked');
      td.id=`cell-${emp.uid}-${d}`; td.dataset.uid=emp.uid; td.dataset.day=d;
      if(canEdit){ td.addEventListener('click',()=>openEditModal(emp.uid,d)); td.title='タップして編集'; }
      else td.title='当日以外は編集できません';
      renderCell(td,null);
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  });
}

function renderCell(td,data){
  if(!data||(!data.work&&!data.hours)){
    td.innerHTML=`<div class="cc"><span class="cd">－</span></div>`; return;
  }
  td.innerHTML=`<div class="cc"><div class="cw" title="${data.work||''}">${data.work||''}</div>${data.hours?`<div class="ch">${data.hours}h</div>`:''}</div>`;
}

// ===== REALTIME SYNC — 安定版 =====
function subReports(){
  cleanup();
  const {db,collection,onSnapshot} = fb();
  const mk = mkKey();

  // 全従業員を一括監視（コレクショングループ的に）
  S.emps.forEach(emp=>{
    if(!S.data[emp.uid]) S.data[emp.uid]={};
    const ref = collection(db,'reports',mk,emp.uid);
    const unsub = onSnapshot(ref, snap=>{
      snap.docChanges().forEach(ch=>{
        const ds=ch.doc.id;
        if(ch.type==='removed'){
          delete S.data[emp.uid][ds];
        } else {
          S.data[emp.uid][ds]=ch.doc.data();
        }
        const dn=parseInt(ds.replace('day-',''),10);
        const td=document.getElementById(`cell-${emp.uid}-${dn}`);
        if(td) renderCell(td, S.data[emp.uid][ds]||null);
      });
      setSyncDot('ok');
    }, err=>{
      console.error('Snapshot err:',err);
      setSyncDot('error');
    });
    S.unsubs.push(unsub);
  });
}

function cleanup(){ S.unsubs.forEach(u=>u()); S.unsubs=[]; }
function resubAll(){ buildTable(); subReports(); }

function setSyncDot(s){
  const d=document.getElementById('syncDot');
  if(s==='error') d.style.background='var(--r)';
  else d.style.background='#4CAF50';
}

// ===== EDIT MODAL =====
function openEditModal(uid,day){
  const emp=S.emps.find(e=>e.uid===uid);
  if(!emp)return;
  const canEdit=(day===S.td&&S.vm===S.tm&&S.vy===S.ty)&&(uid===S.user.uid||S.isAdmin);
  if(!canEdit){showToast('当日以外は編集できません 🔒','error');return;}
  S.editing={uid,day};
  const ds=`day-${String(day).padStart(2,'0')}`;
  const ex=(S.data[uid]||{})[ds]||{};
  const dt=new Date(S.vy,S.vm-1,day);
  document.getElementById('modalInfo').textContent=`${emp.name} / ${S.vm}月${day}日（${DOW[dt.getDay()]}）`;
  document.getElementById('workInput').value=ex.work||'';
  document.getElementById('hoursInput').value=ex.hours||'';
  document.getElementById('memoInput').value=ex.memo||'';
  const c=document.getElementById('wqBtns'); c.innerHTML='';
  WORKS.forEach(t=>{
    const b=document.createElement('button');
    b.className='wqb'+(ex.work===t?' sel':''); b.textContent=t;
    b.onclick=()=>{ document.getElementById('workInput').value=t; c.querySelectorAll('.wqb').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); };
    c.appendChild(b);
  });
  document.getElementById('editModal').classList.add('open');
  setTimeout(()=>document.getElementById('workInput').focus(),300);
}

function closeEditModal(){ document.getElementById('editModal').classList.remove('open'); S.editing=null; }

async function saveCell(){
  const {uid,day}=S.editing||{};
  if(!uid||!day)return;
  const work=document.getElementById('workInput').value.trim();
  const hours=document.getElementById('hoursInput').value;
  const memo=document.getElementById('memoInput').value.trim();
  if(!work&&!hours&&!memo){showToast('入力内容がありません','error');return;}
  const emp=S.emps.find(e=>e.uid===uid);
  const mk=mkKey(), ds=`day-${String(day).padStart(2,'0')}`;
  const d={name:emp.name||emp.email,day:String(day),work,hours:hours?String(hours):'',memo,uid,updatedAt:fb().serverTimestamp()};
  setSyncDot('syncing');
  try{
    const {db,doc,setDoc}=fb();
    await setDoc(doc(db,'reports',mk,uid,ds),d);
    showToast('💾 保存しました','success');
    closeEditModal(); setSyncDot('ok');
  }catch(e){
    console.error(e);
    S.pending[`${uid}_${ds}`]={mk,uid,ds,d};
    if(!S.data[uid])S.data[uid]={};
    S.data[uid][ds]=d;
    const td=document.getElementById(`cell-${uid}-${day}`);
    if(td)renderCell(td,d);
    closeEditModal();
    showToast('⚠ オフライン保存','error'); setSyncDot('error');
  }
}

async function clearCell(){
  if(!confirm('このセルのデータをクリアしますか？'))return;
  const {uid,day}=S.editing||{};
  if(!uid||!day)return;
  const mk=mkKey(), ds=`day-${String(day).padStart(2,'0')}`;
  try{
    const {db,doc,deleteDoc}=fb();
    await deleteDoc(doc(db,'reports',mk,uid,ds));
    showToast('🗑 削除しました'); closeEditModal(); setSyncDot('ok');
  }catch(e){ showToast('削除に失敗しました','error'); }
}

function setH(h){ document.getElementById('hoursInput').value=h; }

// ===== PENDING SAVE =====
async function saveAllPending(){
  const keys=Object.keys(S.pending);
  if(!keys.length){showToast('保存するデータがありません');return;}
  setSyncDot('syncing');
  let n=0;
  for(const k of keys){
    const {mk,uid,ds,d}=S.pending[k];
    try{
      const {db,doc,setDoc}=fb();
      await setDoc(doc(db,'reports',mk,uid,ds),d);
      delete S.pending[k]; n++;
    }catch(e){console.error(e);}
  }
  setSyncDot('ok');
  showToast(`${n}件を同期しました`,'success');
}

// ===== MONTH NAV =====
function changeMonth(d){
  S.vm+=d;
  if(S.vm>12){S.vm=1;S.vy++;}
  if(S.vm<1){S.vm=12;S.vy--;}
  S.data={};
  updInfo(); buildTable(); subReports();
}

function scrollToToday(){
  if(S.vm!==S.tm||S.vy!==S.ty){
    S.vy=S.ty; S.vm=S.tm; S.data={};
    updInfo(); buildTable(); subReports();
    setTimeout(doScroll,400);
  } else doScroll();
}

function doScroll(){
  const th=document.getElementById(`th-${S.td}`);
  if(th){
    const sc=document.getElementById('sheetScroll');
    const tr=document.getElementById('reportTable').getBoundingClientRect();
    const thr=th.getBoundingClientRect();
    const sr=sc.getBoundingClientRect();
    sc.scrollTo({left:Math.max(0,sc.scrollLeft+thr.left-sr.left-120),behavior:'smooth'});
  }
}

function filterRows(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  document.querySelectorAll('#tableBody tr').forEach(tr=>{
    tr.style.display=(!q||(tr.dataset.name||'').toLowerCase().includes(q))?'':'none';
  });
}

// ===== CSV =====
function exportCSV(){
  const y=S.vy,m=S.vm,days=daysIn(y,m);
  let csv='\uFEFF氏名,日付,作業内容,作業時間,備考\n';
  S.emps.forEach(emp=>{
    for(let d=1;d<=days;d++){
      const ds=`day-${String(d).padStart(2,'0')}`;
      const data=(S.data[emp.uid]||{})[ds];
      if(data&&(data.work||data.hours)){
        csv+=`"${(emp.name||'').replace(/"/g,'""')}","${y}/${String(m).padStart(2,'0')}/${String(d).padStart(2,'0')}","${(data.work||'').replace(/"/g,'""')}","${(data.hours||'')}","${(data.memo||'').replace(/"/g,'""')}"\n`;
      }
    }
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=`日報_${y}${String(m).padStart(2,'0')}.csv`;
  a.click(); showToast('CSVをダウンロードしました','success');
}

// ===== ADMIN =====
function openAdminModal(){
  switchAdminTab('active');
  document.getElementById('adminModal').classList.add('open');
}
function closeAdminModal(){ document.getElementById('adminModal').classList.remove('open'); }

function switchAdminTab(tab){
  ['active','hidden','add'].forEach(t=>{
    document.getElementById('atab-'+t).classList.toggle('active', t===tab);
    document.getElementById('apanel-'+t).style.display = t===tab ? '' : 'none';
  });
  if(tab==='active') renderAdminList('active');
  if(tab==='hidden') renderAdminList('hidden');
}

function toggleAddForm(){
  const f=document.getElementById('addUserForm');
  f.style.display=f.style.display==='none'?'':'none';
}

function renderAdminList(type){
  const all = S.allUsersForAdmin || S.emps;
  const list = type==='hidden'
    ? all.filter(u=>u.hidden)
    : all.filter(u=>!u.hidden);

  const containerId = type==='hidden' ? 'userListHidden' : 'userListActive';
  const c = document.getElementById(containerId);
  c.innerHTML = '';

  if(!list.length){
    c.innerHTML = `<p style="text-align:center;color:var(--g6);padding:16px;font-size:13px;">${type==='hidden'?'非表示のユーザーはいません':'ユーザーがいません'}</p>`;
    return;
  }

  list.forEach(emp=>{
    const d = document.createElement('div');
    d.className = 'uitem' + (emp.hidden ? ' is-hidden' : '');
    const left = document.createElement('div');
    left.innerHTML =
      '<div class="un">'+(emp.name||'')
      +(emp.isAdmin?' <span class="badge-admin">管理者</span>':'')
      +(emp.hidden?' <span class="badge-hidden">非表示</span>':'')
      +'</div><div class="ue">'+(emp.email||'')+'</div>';

    const btns = document.createElement('div');
    btns.className = 'uitem-btns';

    if(emp.uid !== S.user.uid){
      if(!emp.hidden){
        const hBtn = document.createElement('button');
        hBtn.className = 'btn-hide';
        hBtn.textContent = '非表示';
        hBtn.addEventListener('click', ()=>toggleHideUser(emp.uid, emp.name||emp.email, true));
        btns.appendChild(hBtn);
      } else {
        const sBtn = document.createElement('button');
        sBtn.className = 'btn-show';
        sBtn.textContent = '表示に戻す';
        sBtn.addEventListener('click', ()=>toggleHideUser(emp.uid, emp.name||emp.email, false));
        btns.appendChild(sBtn);
      }
    } else {
      const self = document.createElement('span');
      self.style.cssText = 'font-size:11px;color:var(--g6);padding:5px 8px;';
      self.textContent = '（自分）';
      btns.appendChild(self);
    }

    d.appendChild(left);
    d.appendChild(btns);
    c.appendChild(d);
  });
}

// ===== 非表示 / 表示に戻す =====
async function toggleHideUser(uid, name, hide){
  const msg = hide
    ? `「${name}」を非表示にしますか？\nログインは維持されます。日報から見えなくなります。`
    : `「${name}」を表示に戻しますか？`;
  if(!confirm(msg)) return;
  showLoad(true);
  try{
    const {db, doc, updateDoc} = fb();
    await updateDoc(doc(db,'users',uid), { hidden: hide });
    showToast(hide ? `${name} を非表示にしました` : `${name} を表示に戻しました`, 'success');
    await loadEmps();
    buildTable(); subReports();
    renderAdminList(hide ? 'active' : 'hidden');
    // タブも切り替えて反映
    switchAdminTab(hide ? 'hidden' : 'active');
  }catch(e){
    console.error(e);
    showToast('更新に失敗しました: '+e.message, 'error');
  }finally{ showLoad(false); }
}

// ===== 従業員追加（管理者が自分のセッションを保持したまま） =====
async function addUser(){
  const name=document.getElementById('nuName').value.trim();
  const email=document.getElementById('nuEmail').value.trim();
  const pass=document.getElementById('nuPass').value;
  const isAdm=document.getElementById('nuAdmin').checked;
  if(!name||!email||!pass){showToast('すべての項目を入力してください','error');return;}
  if(pass.length<6){showToast('パスワードは6文字以上です','error');return;}
  if(S.emps.length>=10){showToast('従業員は最大10名です','error');return;}

  // ⚠️ クライアント側での追加は現在のユーザーがログアウトされる問題があるため
  // Firestoreに直接ユーザー情報を登録する方式に変更
  // AuthはFirebaseコンソールまたは別途作成してもらう
  showToast('Firebaseコンソールでユーザーを作成後\nFirestoreにusersドキュメントを追加してください','error');
  
  // 代わりにFirestoreのusers仮登録（Auth側はコンソールで作成）
  showLoad(true);
  try{
    const {db,collection,getDocs,doc,setDoc,serverTimestamp}=fb();
    // 既存ユーザーから一致するemailを探す
    const snap=await getDocs(collection(db,'users'));
    let found=false;
    snap.forEach(d=>{ if(d.data().email===email)found=true; });
    if(found){showToast('このメールアドレスは既に登録されています','error');showLoad(false);return;}
    
    // ダミーUIDで仮登録（実際のAuthUID取得後に更新が必要）
    const tmpId='tmp_'+Date.now();
    await setDoc(doc(db,'users',tmpId),{
      uid:tmpId, name, email, isAdmin:isAdm, pending:true, createdAt:serverTimestamp()
    });
    showToast(`${name} を仮登録しました。本人がログインすると正式登録されます`,'success');
    document.getElementById('nuName').value='';
    document.getElementById('nuEmail').value='';
    document.getElementById('nuPass').value='';
    document.getElementById('addUserForm').style.display='none';
    await loadEmps(); buildTable(); subReports(); renderAdminList();
  }catch(e){
    showToast('登録に失敗: '+e.message,'error');
  }finally{ showLoad(false); }
}

// ===== UI =====
function showScr(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
let tTimer;
function showToast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show'+(type?' '+type:'');
  clearTimeout(tTimer); tTimer=setTimeout(()=>el.classList.remove('show'),3000);
}
function showLoad(v){ document.getElementById('loadingOv').classList.toggle('show',v); }
</script>
</body>
</html>
